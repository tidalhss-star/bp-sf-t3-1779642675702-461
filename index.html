        nav a {

            padding-bottom: 4px;
        }

        nav a:hover {
            border-bottom-color: #ff3b00;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            background: none;
            border: none;
            padding: 8px;
        }

        .hamburger span {
            display: block;
            width: 30px;
            height: 4px;
            background-color: #ffffff;
            border-radius: 0;
            transition: all 0.2s;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Mobile nav */
        .mobile-nav {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000000;
            z-index: 99;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 48px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .mobile-nav.open {
            display: flex;
            opacity: 1;
            pointer-events: auto;
        }

        .mobile-nav a {
            font-size: 2.5rem;
            border-bottom: 4px solid #ff3b00;
            padding-bottom: 8px;
        }

            overflow: hidden;
        }

            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,59,0,0.05) 40px, rgba(255,59,0,0.05) 80px);

            z-index: 2;

            margin-left: -48px; /* negative margin for brutalist overlap */

            line-height: 0.85;

            gap: 48px;

        .service-card {
            background-color: #111111;
            border: 4px solid #ff3b00;
            padding: 48px;
            transform: rotate(-1deg);
            position: relative;
        }

        .service-card:nth-child(2) {
            transform: rotate(2deg) translateY(-24px);
        }

        .service-card:nth-child(3) {
            transform: rotate(1deg) translateX(24px);
        }

        .service-card:nth-child(4) {
            transform: rotate(-2deg) translateY(24px);
        }

        .service-card h3 {
            margin-bottom: 24px;
        }

        .service-card p {
            margin-bottom: 24px;
            font-size: 1rem;
        }

        /* Reviews */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 48px;
        }

        .review-card {
            background-color: #ffffff;
            color: #000000;
            border: 4px solid #ff3b00;
            padding: 48px;
            transform: skewX(-2deg);
            transition: transform 0.2s;

        .review-card:hover {
            transform: skewX(0deg) scale(1.02);
        }

        .review-card .reviewer {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .review-card .date {

            padding-left: 16px;

            align-items: center;
            text-align: center;
            gap: 48px;
            padding: 72px;
            border: 4px solid #ff3b00;

            .reviews-grid {
